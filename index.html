<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#fbf5ff">
  <title>乐乐快乐补给站</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-one" aria-hidden="true">✨</div>
  <div class="ambient ambient-two" aria-hidden="true">🫧</div>
  <div class="ambient ambient-three" aria-hidden="true">🌸</div>

  <main class="app-shell">
    <section id="welcome" class="screen welcome-screen" aria-labelledby="welcome-title">
      <p class="eyebrow">FOR PRINCESS LELE</p>

      <div class="princess-portrait" aria-hidden="true">
        <span class="portrait-emoji">👸🏻</span>
        <span class="portrait-accent accent-lipstick">💄</span>
        <span class="portrait-accent accent-mirror">🪞</span>
        <span class="portrait-accent accent-heart">💗</span>
        <span class="portrait-accent accent-sparkle">✨</span>
      </div>

      <p class="welcome-label">WELCOME TO</p>
      <h1 id="welcome-title">乐乐快乐补给站</h1>
      <div class="title-rule" aria-hidden="true"></div>
      <p class="welcome-copy">这里收集着一些，<br>正在向乐乐靠近的好事。</p>

      <div class="beauty-note" aria-hidden="true">
        <span>💄</span>
        <span class="beauty-note-copy">BE HAPPY · BE SHINING</span>
        <span>🪞</span>
      </div>

      <button id="enter-button" class="primary-button" type="button">进去看看吧 <span aria-hidden="true">✨</span></button>
      <small>开启小公主的闪耀模式</small>
    </section>

    <section id="station" class="screen station-screen" aria-labelledby="station-title" hidden>
      <div class="station-crown" aria-hidden="true">👑</div>
      <p id="station-eyebrow" class="eyebrow">GOOD THINGS ARE COMING</p>
      <h2 id="station-title">乐乐快乐补给站</h2>
      <p class="station-intro">点亮爱心，好事正在向你靠近 <span aria-hidden="true">✨</span></p>
      <div id="progress" class="progress" role="status" aria-live="polite">已点亮 0 / 6</div>

      <div id="card-grid" class="card-grid" aria-label="快乐补给卡片"></div>

      <section id="completion-card" class="completion-card" aria-live="polite" hidden>
        <div class="completion-icons" aria-hidden="true">✨ 💗 ✨</div>
        <p class="completion-label">ALL GOOD THINGS LIT</p>
        <p id="completion-message"></p>
      </section>

      <footer class="station-footer" aria-hidden="true">💄 <span>LELE · KEEP SHINING</span> 🎀</footer>
    </section>
  </main>

  <div id="celebration-layer" class="celebration-layer" aria-hidden="true" hidden>
    <div class="celebration-glow"></div>
    <div class="burst-heart">💗</div>
    <div id="burst-particles" class="burst-particles"></div>
  </div>

  <dialog id="message-dialog" aria-labelledby="dialog-message">
    <div class="dialog-panel">
      <button id="dialog-close" type="button" aria-label="关闭悄悄话">×</button>
      <div id="dialog-emoji" class="dialog-emoji" aria-hidden="true"></div>
      <p class="dialog-label">GOOD THINGS FOR LELE</p>
      <p id="dialog-message"></p>
      <button id="dialog-continue" class="dialog-continue" type="button">继续点亮 <span aria-hidden="true">💗</span></button>
    </div>
  </dialog>

  <script src="content.js"></script>
  <script src="state.js"></script>
  <script src="app.js"></script>
</body>
</html>
